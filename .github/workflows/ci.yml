name: CI-CD

on:
  push:
    branches: [main, devops]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  DEPLOY_ENABLED: false

jobs:
  check-versions:
    name: Check Pinned Versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for non-pinned versions
        run: bash scripts/check-versions.sh

  test-backend:
    name: Test (backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Upgrade pip, setuptools and wheel
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q tests/

  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and test frontend (inside Node docker)
        run: |
          # Run frontend install & tests inside an official Node container to avoid host/tooling issues
          docker run --rm \
            -v ${{ github.workspace }}/frontend:/app \
            -w /app \
            node:20-bullseye-slim \
            bash -lc "if [ -f package-lock.json ]; then npm ci --prefer-offline --no-audit; else npm install --no-audit; fi && npm test --if-present"

  build:
    name: Build And Push
    needs: [check-versions, test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      repository_lower: ${{ steps.vars.outputs.repository_lower }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize repository name
        id: vars
        run: echo "repository_lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.repository_lower }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.repository_lower }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement désactivé par défaut
        if: env.DEPLOY_ENABLED != 'true'
        run: echo "Déploiement désactivé pour ce projet"

      - name: Deploy via SSH
        if: env.DEPLOY_ENABLED == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/trombiflow
            export IMAGE_TAG=${{ github.sha }}
            export GITHUB_REPOSITORY_LOWER=${{ needs.build.outputs.repository_lower }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
