apiVersion: v1
kind: Secret
metadata:
  name: trombiflow-secrets
  namespace: trombiflow
type: Opaque
stringData:
  DATABASE_URL: "postgresql://trombiflow:CHANGE_ME@postgres:5432/trombiflow"
  JWT_SECRET: "CHANGE_ME_WITH_A_LONG_RANDOM_SECRET"
  POSTGRES_DB: "trombiflow"
  POSTGRES_USER: "trombiflow"
  POSTGRES_PASSWORD: "CHANGE_ME"
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "CHANGE_ME"
  S3_BUCKET: "trombiflow"
  S3_ENDPOINT: "http://minio:9000"
  S3_KEY: "minioadmin"
  S3_SECRET: "CHANGE_ME"
