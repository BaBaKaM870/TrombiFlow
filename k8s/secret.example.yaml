# ============================================================
# TrombiFlow - Secret Template (Kubernetes Secret)
# ============================================================
#
# ⚠️ IMPORTANT: Ce fichier est un TEMPLATE exemple.
#
# Pour utiliser ce fichier en production :
# 1. Copier ce fichier : cp secret.example.yaml secret.yaml
# 2. Remplacer les valeurs CHANGE_ME par des secrets réels
# 3. ⚠️ JAMAIS commiter le fichier secret.yaml dans Git !
# 4. Ajouter secret.yaml au .gitignore
# 5. Appliquer le secret : kubectl apply -f secret.yaml
#
# Alternative sécurisée (recommandée) :
# Utiliser sealed-secrets ou external-secrets pour gérer les secrets
# via Git de manière sécurisée.
#
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: trombiflow-secrets
  namespace: trombiflow
  labels:
    app: trombiflow
    component: secrets
type: Opaque
stringData:
  # ============================================================
  # Base de données PostgreSQL
  # ============================================================
  # URL de connexion complète à PostgreSQL
  # Format : postgresql://user:password@host:port/database
  DATABASE_URL: "postgresql://trombiflow:CHANGE_ME_WITH_STRONG_PASSWORD@postgres:5432/trombiflow"

  # Identifiants PostgreSQL (utilisés par le pod postgres)
  POSTGRES_DB: "trombiflow"
  POSTGRES_USER: "trombiflow"
  POSTGRES_PASSWORD: "CHANGE_ME_WITH_STRONG_PASSWORD"

  # ============================================================
  # Authentification (JWT)
  # ============================================================
  # Secret JWT pour signer les tokens d'authentification
  # À générer : openssl rand -base64 32
  JWT_SECRET: "CHANGE_ME_WITH_A_LONG_RANDOM_SECRET_MIN_32_CHARS"

  # ============================================================
  # MinIO (Stockage S3-compatible)
  # ============================================================
  # Identifiants root MinIO
  MINIO_ROOT_USER: "CHANGE_ME_MINIOADMIN"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_WITH_STRONG_PASSWORD"

  # Paramètres S3/MinIO (utilisés si STORAGE_TYPE=s3)
  S3_BUCKET: "trombiflow"
  S3_ENDPOINT: "http://minio:9000"
  S3_KEY: "CHANGE_ME_MINIOADMIN"
  S3_SECRET: "CHANGE_ME_WITH_STRONG_PASSWORD"

  # ============================================================
  # Monitoring & Alertes (optionnel)
  # ============================================================
  # Sentry DSN pour la capture d'erreurs (optionnel)
  # SENTRY_DSN: "https://xxxxx@sentry.io/xxxxx"

  # ============================================================
  # Instructions de génération de secrets forts
  # ============================================================
  # 
  # Pour générer un password fort (32 caractères base64) :
  #   openssl rand -base64 32
  #
  # Pour générer un JWT secret :
  #   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
  #
  # Assurez-vous que :
  # - Les mots de passe contiennent au moins 16 caractères
  # - Utiliser des caractères spéciaux, majuscules, minuscules
  # - Être unique par environnement (dev ≠ staging ≠ prod)
