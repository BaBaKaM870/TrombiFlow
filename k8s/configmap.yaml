apiVersion: v1
kind: ConfigMap
metadata:
  name: trombiflow-config
  namespace: trombiflow
  labels:
    app: trombiflow
    component: config
data:
  # ============================================================
  # Mode d'exécution
  # ============================================================
  ENV: "production"

  # ============================================================
  # Backend (API FastAPI)
  # ============================================================
  PORT: "8000"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

  # ============================================================
  # Stockage
  # ============================================================
  STORAGE_TYPE: "local"
  UPLOAD_DIR: "/data/uploads"

  # ============================================================
  # Frontend
  # ============================================================
  FRONTEND_PORT: "80"

  # ============================================================
  # Logging & Monitoring
  # ============================================================
  LOG_LEVEL: "info"
  WORKERS: "4"
