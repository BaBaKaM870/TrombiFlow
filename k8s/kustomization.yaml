apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trombiflow

commonLabels:
  app: trombiflow
  environment: production
  managed-by: kustomize

commonAnnotations:
  deploy.trombiflow.io/version: "1.0"

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  # secret.yaml N'EST PAS inclus ici (gérer manuellement ou via sealed-secrets)
  - postgres.yaml
  - minio.yaml
  - backend.yaml
  - frontend.yaml
  - networkpolicy.yaml
  - ingress.yaml
  - hpa.yaml

images:
  - name: ghcr.io/babakam870/trombiflow/backend
    newTag: latest
  - name: ghcr.io/babakam870/trombiflow/frontend
    newTag: latest
  - name: postgres
    newTag: "15-alpine"
  - name: minio/minio
    digest: sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e

replicas:
  - name: backend
    count: 2
  - name: frontend
    count: 2

sortOptions:
  order: fifo
