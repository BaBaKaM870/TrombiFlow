services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    networks:
      - backend
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  web:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/backend:${IMAGE_TAG}
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      ENV: production
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/frontend:${IMAGE_TAG}
    restart: unless-stopped
    networks:
      - backend
      - public
    depends_on:
      - web
    ports:
      - "${FRONTEND_PORT:-80}:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  db_data:
  uploads_data:
  minio_data:

networks:
  backend:
    internal: true
  public:
