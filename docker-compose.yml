services:
  db:
    image: postgres:15-alpine
    container_name: trombiflow-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trombiflow} -d ${POSTGRES_DB:-trombiflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: trombiflow-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trombiflow-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENV: development
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_TYPE: ${STORAGE_TYPE}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /data/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/data/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trombiflow-frontend
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  db_data:
  uploads_data:
  minio_data:
